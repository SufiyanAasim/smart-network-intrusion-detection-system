version: 2
updates:
  - package-ecosystem: pip
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Asia/Karachi
    open-pull-requests-limit: 5
