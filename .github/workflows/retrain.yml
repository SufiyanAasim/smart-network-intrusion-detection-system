name: retrain-models

# Retrain when model inputs change on main, or when a maintainer explicitly
# requests a run. Artifacts are reviewed before being committed.
on:
  push:
    branches: [main]
    paths:
      - "data/nsl-kdd/**"
      - "scripts/train_models.py"
      - "src/nids/features.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: retrain-models-${{ github.ref }}
  cancel-in-progress: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install runtime dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Retrain models
        run: python scripts/train_models.py
      - name: Sanity-check retrained models
        run: |
          python - <<'PY'
          import os

          import joblib

          for name in ("rf_model.pkl", "dt_model.pkl", "iforest_model.pkl"):
              path = os.path.join("models", name)
              assert os.path.exists(path), f"missing {path}"
              joblib.load(path)
          print("All models retrained and load cleanly.")
          PY
      - name: Upload model artifacts
        uses: actions/upload-artifact@v7
        with:
          name: retrained-models-${{ github.sha }}
          path: models/*.pkl
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
