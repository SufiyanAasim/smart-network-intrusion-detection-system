name: nids

x-nids-common: &nids-common
  build:
    context: .
    dockerfile: Dockerfile
  image: nids:11.0.0
  init: true
  restart: unless-stopped
  stop_grace_period: 30s
  env_file:
    - path: .env
      required: false
  read_only: true
  tmpfs:
    - /tmp:size=128m,mode=1777
  security_opt:
    - no-new-privileges:true

services:
  # Safe default: upload analysis, dashboard, history, and exports. Raw host
  # capture is intentionally reserved for the explicit `capture` profile.
  nids:
    <<: *nids-common
    ports:
      - "${NIDS_DASHBOARD_PORT:-8501}:8501"
    environment:
      PORT: "8501"
      NIDS_DB_PATH: /data/history.db
      NIDS_AUTH_DB_PATH: /data/auth.db
      NIDS_AUTONOMY_MODE: ${NIDS_AUTONOMY_MODE:-shadow}
      NIDS_AUTONOMY_EXECUTE: ${NIDS_AUTONOMY_EXECUTE:-false}
    volumes:
      - nids-data:/data
      - ./models:/app/models:ro
    cap_drop:
      - ALL

  # Optional read-only REST API sharing the dashboard's SQLite history.
  # Start dashboard + API: docker compose --profile api up --build
  nids-api:
    <<: *nids-common
    profiles: ["api"]
    command: ["python", "src/nids/api.py"]
    ports:
      - "${NIDS_API_EXPOSE_PORT:-8600}:8600"
    environment:
      NIDS_API_HOST: 0.0.0.0
      NIDS_API_PORT: "8600"
      NIDS_DB_PATH: /data/history.db
    volumes:
      - nids-data:/data
    cap_drop:
      - ALL
    healthcheck:
      # The API intentionally authenticates /health when NIDS_API_TOKEN is set.
      # Read the token inside Python so it never appears in the Compose command.
      test:
        - CMD
        - python
        - -c
        - >-
          import os,urllib.request;
          t=os.getenv('NIDS_API_TOKEN');
          h={'Authorization':f'Bearer {t}'} if t else {};
          urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8600/health',headers=h),timeout=4)
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Linux-only host capture profile. It is not Npcap: Windows Npcap serves
  # native/desktop runs, while Linux containers use libpcap + capabilities.
  # Start only this service: docker compose --profile capture up nids-capture
  nids-capture:
    <<: *nids-common
    profiles: ["capture"]
    network_mode: host
    user: root
    environment:
      PORT: "8501"
      NIDS_DB_PATH: /data/history.db
      NIDS_AUTH_DB_PATH: /data/auth.db
      NIDS_AUTONOMY_MODE: ${NIDS_AUTONOMY_MODE:-shadow}
      NIDS_AUTONOMY_EXECUTE: ${NIDS_AUTONOMY_EXECUTE:-false}
    volumes:
      - nids-data:/data
      - ./models:/app/models:ro
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  nids-data:
    # Version-neutral so future image upgrades keep one persistent data volume.
    # Existing installations can temporarily set NIDS_HISTORY_VOLUME to their
    # previous volume name while migrating data.
    name: ${NIDS_HISTORY_VOLUME:-nids-history}
