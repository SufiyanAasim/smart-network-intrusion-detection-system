# Reference list of the 41 NSL-KDD feature columns the models expect,
# in the exact order used by src/nids/features.py::MODEL_FEATURES.
# Keep this in sync manually if the feature set ever changes.
features:
  - duration
  - protocol_type
  - service
  - flag
  - src_bytes
  - dst_bytes
  - land
  - wrong_fragment
  - urgent
  - hot
  - num_failed_logins
  - logged_in
  - num_compromised
  - root_shell
  - su_attempted
  - num_root
  - num_file_creations
  - num_shells
  - num_access_files
  - num_outbound_cmds
  - is_host_login
  - is_guest_login
  - count
  - srv_count
  - serror_rate
  - srv_serror_rate
  - rerror_rate
  - srv_rerror_rate
  - same_srv_rate
  - diff_srv_rate
  - srv_diff_host_rate
  - dst_host_count
  - dst_host_srv_count
  - dst_host_same_srv_rate
  - dst_host_diff_srv_rate
  - dst_host_same_src_port_rate
  - dst_host_srv_diff_host_rate
  - dst_host_serror_rate
  - dst_host_srv_serror_rate
  - dst_host_rerror_rate
  - dst_host_srv_rerror_rate

categorical_columns:
  - protocol_type
  - service
  - flag

models:
  random_forest: models/rf_model.pkl
  decision_tree: models/dt_model.pkl

data:
  train: data/nsl-kdd/KDDTrain+.txt
  test: data/nsl-kdd/KDDTest+.txt
