services:
  - type: web
    name: s-nids-dashboard
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: checksPass
    healthCheckPath: /_stcore/health
    envVars:
      # Render deployments fail closed when this secret is not configured.
      - key: NIDS_AUTH_PASSWORD_HASH
        value: pbkdf2_sha256$260000$0b331d1815877bee7eb89bfd59a80c05$5521f5a3bb793d1c3186d31c9b174569f1b8bbd20f3a4502c9fbb99a7f07e88f
      - key: NIDS_AUTH_USERS
        value: '[{"username":"admin","password_hash":"pbkdf2_sha256$260000$0b331d1815877bee7eb89bfd59a80c05$5521f5a3bb793d1c3186d31c9b174569f1b8bbd20f3a4502c9fbb99a7f07e88f","role":"admin"},{"username":"viewer","password_hash":"pbkdf2_sha256$260000$e96cbb9b569fc90a71fe223d06a1de8b$3da1691d13748a814d37c3e5f191b1a95c7b002ff7bce351f9f81bdfff9ed9ed","role":"viewer"}]'
      - key: NIDS_AUTH_USERNAME
        value: admin
      - key: NIDS_SIGNUP_ENABLED
        value: "true"
      - key: NIDS_AUTH_DB_PATH
        value: /data/auth.db
      - key: NIDS_DB_PATH
        value: /data/history.db
      - key: MAX_PCAP_UPLOAD_MB
        value: "50"
      - key: ALERT_COOLDOWN_SECONDS
        value: "60"
      - key: CRITICAL_THRESHOLD_PCT
        value: "20"
      - key: NIDS_AUTONOMY_MODE
        value: shadow
      - key: NIDS_AUTONOMY_EXECUTE
        value: "false"
